<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Videoteca · Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f14;
           color: #e2e2e8; display: flex; justify-content: center;
           align-items: center; min-height: 100vh; }
    .card { background: #1a1a24; border: 1px solid #2e2e42;
            border-radius: 12px; padding: 2.5rem; width: 360px; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #fff; }
    label { display: block; font-size: .85rem; color: #9090a8; margin-bottom: .4rem; }
    input  { width: 100%; padding: .65rem .9rem; background: #0f0f18;
             border: 1px solid #2e2e42; border-radius: 8px; color: #e2e2e8;
             font-size: .95rem; margin-bottom: 1rem; outline: none; }
    input:focus { border-color: #6c63ff; }
    button { width: 100%; padding: .75rem; background: #6c63ff;
             color: #fff; border: none; border-radius: 8px;
             font-size: 1rem; cursor: pointer; transition: background .2s; }
    button:hover { background: #574fd6; }
    .toggle { text-align: center; margin-top: 1rem; font-size: .85rem; color: #9090a8; }
    .toggle a { color: #6c63ff; cursor: pointer; }
    #msg { margin-top: .8rem; font-size: .85rem; color: #ff6b6b; text-align: center; }
  </style>
</head>
<body>
<div class="card">
  <h1 id="form-title">Iniciar sesión</h1>
  <label>Email</label>
  <input type="email" id="email" placeholder="usuario@ejemplo.com">
  <label>Contraseña</label>
  <input type="password" id="password" placeholder="••••••••">
  <button onclick="submit()">Entrar</button>
  <div class="toggle">
    ¿Sin cuenta? <a onclick="toggleMode()">Regístrate</a>
  </div>
  <div id="msg"></div>
</div>

<script>
  const API = "http://localhost:8000";
  let mode = "login";

  function toggleMode() {
    mode = mode === "login" ? "register" : "login";
    document.getElementById("form-title").textContent =
      mode === "login" ? "Iniciar sesión" : "Crear cuenta";
    document.querySelector(".toggle a").textContent =
      mode === "login" ? "Regístrate" : "Inicia sesión";
    document.getElementById("msg").textContent = "";
  }

  async function submit() {
    const email    = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const endpoint = mode === "login" ? "/auth/login" : "/auth/register";

    const res  = await fetch(API + endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!res.ok) {
      document.getElementById("msg").textContent =
        data.detail || "Error en la solicitud";
      return;
    }

    if (mode === "register") {
      document.getElementById("msg").style.color = "#4caf50";
      document.getElementById("msg").textContent = "Cuenta creada. Ahora inicia sesión.";
      toggleMode();
      return;
    }

    // Guardar JWT y redirigir
    const payload = JSON.parse(atob(data.access_token.split(".")[1]));
    localStorage.setItem("token", data.access_token);
    localStorage.setItem("role", payload.role);
    window.location.href = payload.role === "admin" ? "admin.html" : "catalog.html";
  }
</script>
</body>
</html>
